<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<!-- Fonte elegante -->
<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&display=swap" rel="stylesheet">

<h1 class="titulo-casamento">
  Um presente seu, uma memória pra sempre
</h1>

<style>
.titulo-casamento {
  font-family: 'Great Vibes', cursive;
  font-size: 48px;
  text-align: center;
  color: #6a0dad;
  margin-top: 30px;
  margin-bottom: 30px;
  text-shadow: 1px 1px 2px black;

  /* ANIMAÇÃO */
  opacity: 0;
  animation: fadeElegante 2s ease forwards;
}

/* efeito fade + leve subida */
@keyframes fadeElegante {
  from {
    opacity: 0;
    transform: translateY(20px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

/* fundo opcional */
body {
  background: linear-gradient(135deg, #2b0033, #000000);
}
</style>

<style>

/* ===== ESTILO GERAL ===== */
body {
  font-family: Arial;
  background: linear-gradient(135deg, #0f0f0f, #4b0082);
  color: white;
  margin: 0;
}

/* ===== BLOQUEIO ===== */
#bloqueio {
  position: fixed;
  width: 100%;
  height: 100%;
  background: linear-gradient(135deg, #000, #4b0082);
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
}

/* ANIMAÇÃO */
.fade {
  animation: fadeIn 1s ease forwards;
}

@keyframes fadeIn {
  from {opacity: 0; transform: scale(0.9);}
  to {opacity: 1; transform: scale(1);}
}

/* INPUT */
input {
  padding: 12px;
  border-radius: 8px;
  border: none;
  margin: 10px;
  text-align: center;
}

/* BOTÃO */
button {
  background: linear-gradient(45deg, purple, violet);
  border: none;
  padding: 10px 20px;
  color: white;
  border-radius: 6px;
  cursor: pointer;
  transition: 0.3s;
}

button:hover {
  transform: scale(1.1);
}

/* WHATS */
.whats {
  color: #25D366;
  margin-top: 15px;
  text-decoration: none;
  font-weight: bold;
}

/* ===== CONTEÚDO ===== */
#conteudo {
  display: none;
  padding: 20px;
}

/* CONTAINER */
.container {
  max-width: 900px;
  margin: auto;
}

/* ITEM */
.item {
  display: flex;
  align-items: center;
  gap: 20px;
  background: rgba(255,255,255,0.08);
  padding: 20px;
  margin: 15px 0;
  border-radius: 12px;
}

/* IMAGEM */
.produto {
  width: 120px;
  height: 120px;
  object-fit: contain;
  transition: 0.4s;
  cursor: pointer;
}

.produto:hover {
  transform: scale(2.5);
}

/* TEXTO */
.info {
  text-align: left;
}

/* BOTÃO COMPRADO */
.comprado {
  background: green !important;
}

/* ===== CURSOR ANIMADO ===== */
#cursor {
  position: fixed;
  width: 40px;
  pointer-events: none;
  z-index: 999;
  display: none;
}

</style>
</head>

<body>

<!-- 🔒 LOGIN -->
<div id="bloqueio" class="fade">

  <h1>🔒 Acesso à Lista</h1>
  <p>Solicite seu código no WhatsApp</p>

  <input id="codigo" placeholder="Digite seu código">

     target="_blank">

</div>

<!-- 🛍️ SITE -->
<div id="conteudo">

  <h1>🎁 Lista de Casamento</h1>

  <div class="container">

    <!-- GELADEIRA -->
    <div class="item">

        <button onclick="marcar(this)">Disponível</button>

    <!-- FOGÃO -->
    <div class="item">
     <img src="Fogao/fogao1.png" class="produto">
     <img src="Fogao/fogao2.png" class="produto">

      <div class="info">
        <strong>Fogão 4 Bocas mesa vidro inox/preto</strong><br><br>
       <button onclick="marcar(this)">Disponível</button>
      </div>
    </div>
    
    <!-- SOFA -->
    <div class="item">
      <img src="Sofa/sofa1.png" class="produto">
      <img src="Sofa/sofa2.png" class="produto">

      <div class="info">
        <strong>Sofá Retrátil e Reclinável</strong><br><br>
        <button onclick="marcar(this)">Disponível</button>

    <!-- MESA -->
    <div class="item">
     <img src="Mesa/mesa1.png" class="produto">
     <img src="Mesa/mesa2.png" class="produto">

      <div class="info">
        <strong>Mesa Madeira</strong><br><br>
       <button onclick="marcar(this)">Disponível</button>

<!-- PIX -->
<div class="item">
  <img src="Pix/Pix1.png" class="produto">
  <img src="Pix/Pix2.png" class="produto">

  <div class="info">
    <strong>Pix</strong><br><br>

    <input type="number" id="valorPix" placeholder="Digite o valor (R$)"><br><br>

    <button onclick="gerarPix()">Gerar Pix</button><br><br>

    <button onclick="copiarPix()">Copiar código Pix</button>
  </div>
</div>

  </div>

</div>

<img src="Mouse/Aliancas move.gif" id="cursor">

<script>
function gerarPix() {
  let valor = document.getElementById("valorPix").value;

  if (!valor || valor <= 0) {
    alert("Digite um valor válido!");
    return;
  }

  let img = document.getElementById("qrcode");
  img.src = "Qrcode/qrcode-pix.png";
  img.style.display = "block";
}
/* ===== LOGIN ===== */
const codigos = ["1234","5678","9999"];

function validar() {
  let input = document.getElementById("codigo").value.trim();

  if (codigos.includes(input)) {
    document.getElementById("bloqueio").style.display = "none";
    document.getElementById("conteudo").style.display = "block";
  } else {
    alert("Código inválido!");
  }
}

/* ===== BOTÃO ===== */
function marcar(btn) {
  btn.classList.toggle("comprado");
  btn.innerText = btn.classList.contains("comprado") ? "Comprado" : "Disponível";
}

/* ===== PIX ===== */
function format(id, value) {
  let size = value.length.toString().padStart(2, "0");
  return id + size + value;
}

function crc16(str) {
  let crc = 0xFFFF;
  for (let i = 0; i < str.length; i++) {
    crc ^= str.charCodeAt(i) << 8;
    for (let j = 0; j < 8; j++) {
      crc = (crc & 0x8000) ? (crc << 1) ^ 0x1021 : crc << 1;
    }
  }
  return (crc & 0xFFFF).toString(16).toUpperCase().padStart(4, "0");
}

function gerarPayloadPix(valor) {
  let chave = "ladym2393@gmail.com";

  let payload =
    "000201" +
    format("26", format("00","BR.GOV.BCB.PIX") + format("01",chave)) +
    "52040000" +
    "5303986" +
    format("54", parseFloat(valor).toFixed(2)) +
    "5802BR" +
    format("59","PRESENTE") +
    format("60","BRASIL") +
    "62070503***";

  payload += "6304" + crc16(payload + "6304");

  return payload;
}

function gerarLinkPix() {
  let valor = document.getElementById("valorPix").value;
  if (!valor || valor <= 0) return alert("Digite um valor válido!");

  let payload = gerarPayloadPix(valor);

  let a = document.getElementById("linkPix");
  a.href = "pix://" + payload;
  a.style.display = "inline";
}

function copiarPix() {
  let valor = document.getElementById("valorPix").value;
  if (!valor || valor <= 0) return alert("Digite um valor válido!");

  navigator.clipboard.writeText(gerarPayloadPix(valor));
  alert("Código Pix válido copiado!");
}

/* ===== CURSOR ===== */
const cursor = document.getElementById("cursor");

document.addEventListener("mousemove", e => {
  cursor.style.left = e.pageX + "px";
  cursor.style.top = e.pageY + "px";
});

document.querySelectorAll("a, button, img").forEach(el => {
  el.addEventListener("mouseenter", () => cursor.style.display = "block");
  el.addEventListener("mouseleave", () => cursor.style.display = "none");
});

</script>

</body>
</html>
