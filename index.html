<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta charset="UTF-8">

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&display=swap" rel="stylesheet">

<style>
body {
  font-family: Arial;
  background: linear-gradient(135deg, #0f0f0f, #4b0082);
  color: white;
  margin: 0;
}

#bloqueio {
  position: fixed;
  width: 100%;
  height: 100%;
  background: linear-gradient(135deg, #000, #4b0082);
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
}

input {
  padding: 12px;
  border-radius: 8px;
  border: none;
  margin: 10px;
  text-align: center;
}

button {
  background: linear-gradient(45deg, purple, violet);
  border: none;
  padding: 10px 20px;
  color: white;
  border-radius: 6px;
  cursor: pointer;
}

#conteudo {
  display: none;
  padding: 20px;
}

.container {
  max-width: 900px;
  margin: auto;
}

.item {
  display: flex;
  gap: 20px;
  background: rgba(255,255,255,0.08);
  padding: 20px;
  margin: 15px 0;
  border-radius: 12px;
}

.produto {
  width: 120px;
  height: 120px;
}

#checkPix {
  display: none;
  opacity: 0;
  transform: scale(0.8);
  transition: 0.3s;
}

#checkPix.mostrar {
  display: inline-block;
  opacity: 1;
  transform: scale(1.2);
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="bloqueio">
  <h1>🔒 Acesso à Lista</h1>
  <input id="codigo" placeholder="Digite seu código">
  <button onclick="validar()">Entrar</button>
</div>

<!-- CONTEÚDO -->
<div id="conteudo">

<h1 style="text-align:center;font-family:'Great Vibes';font-size:40px;">
Um presente seu 🎁
</h1>

<div class="container">

<!-- PIX -->
<div class="item">
  <img src="Pix/Pix1.png" class="produto">

  <div>
    <strong>Pix</strong><br><br>

    <input type="number" id="valorPix" placeholder="Digite o valor (R$)"><br><br>

    <button onclick="gerarPix()">Gerar Pix</button><br><br>

    <img id="qrcode" style="display:none; width:300px;"><br><br>

    <button onclick="copiarPix()">Copiar código Pix</button>

    <span id="checkPix">✔ Copiado!</span>
  </div>
</div>

</div>
</div>

<script>

// LOGIN
const codigos = ["1234","5678","9999"];

function validar() {
  let input = document.getElementById("codigo").value;

  if (codigos.includes(input)) {
    document.getElementById("bloqueio").style.display = "none";
    document.getElementById("conteudo").style.display = "block";
  } else {
    alert("Código inválido!");
  }
}

// GERAR PIX
function gerarPix() {

  let valor = document.getElementById("valorPix").value;

  if (!valor || valor <= 0) {
    alert("Digite um valor válido!");
    return;
  }

  valor = parseFloat(valor).toFixed(2);

  function crc16(str) {
    let crc = 0xFFFF;

    for (let i = 0; i < str.length; i++) {
      crc ^= str.charCodeAt(i) << 8;

      for (let j = 0; j < 8; j++) {
        crc = (crc & 0x8000) ? (crc << 1) ^ 0x1021 : crc << 1;
      }
    }

    crc &= 0xFFFF;
    return crc.toString(16).toUpperCase().padStart(4, '0');
  }

  let base = "00020126410014BR.GOV.BCB.PIX0119ladym2393@gmail.com52040000530398654";
  let tamanho = valor.length.toString().padStart(2, '0');
  let resto = "5802BR5908PRESENTE6006BRASIL62070503***6304";

  let payload = base + tamanho + valor + resto;
  let crc = crc16(payload);
  let codigoPix = payload + crc;

  window.codigoPixGerado = codigoPix;

  // QR CODE DINÂMICO
  let qr = document.getElementById("qrcode");
  qr.src = "https://api.qrserver.com/v1/create-qr-code/?size=300x300&data=" + codigoPix;
  qr.style.display = "block";
}

// COPIAR PIX
function copiarPix() {

  if (!window.codigoPixGerado) {
    alert("Digite o valor e gere o Pix primeiro!");
    return;
  }

  navigator.clipboard.writeText(window.codigoPixGerado);

  let check = document.getElementById("checkPix");

  check.classList.add("mostrar");

  setTimeout(() => {
    check.classList.remove("mostrar");
  }, 2000);
}

</script>

</body>
</html>
