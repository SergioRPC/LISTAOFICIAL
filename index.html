<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- Fonte elegante -->
<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&display=swap" rel="stylesheet">

<title>🎁 Lista de Casamento</title>

<style>

/* ===== FUNDO ===== */
body {
  font-family: Arial;
  background: linear-gradient(135deg, #1a001f, #000000);
  color: white;
  margin: 0;
}

/* ===== TITULO LUXO ===== */
.titulo-casamento {
  font-family: 'Great Vibes', cursive;
  font-size: 48px;
  text-align: center;
  color: #d8b4ff;
  margin: 30px 15px;
  position: relative;

  text-shadow: 0 0 5px #a855f7, 0 0 15px #6a0dad;

  opacity: 0;
  animation: fadeElegante 1.5s ease forwards;
}

/* brilho passando */
.titulo-casamento::after {
  content: "";
  position: absolute;
  top: 0;
  left: -100%;
  width: 100%;
  height: 100%;

  background: linear-gradient(
    120deg,
    transparent,
    rgba(255,255,255,0.9),
    transparent
  );

  animation: brilhoLuxo 3s infinite;
}

@keyframes fadeElegante {
  from { opacity: 0; transform: translateY(15px); }
  to { opacity: 1; transform: translateY(0); }
}

@keyframes brilhoLuxo {
  0% { left: -100%; }
  100% { left: 100%; }
}

/* MOBILE */
@media (max-width: 600px) {
  .titulo-casamento {
    font-size: 42px !important;
  }
}

/* ===== BLOQUEIO ===== */
#bloqueio {
  position: fixed;
  width: 100%;
  height: 100%;
  background: linear-gradient(135deg, #000, #4b0082);
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
}

/* ===== INPUT ===== */
input {
  padding: 12px;
  border-radius: 8px;
  border: none;
  margin: 10px;
  text-align: center;
}

/* ===== BOTÃO ===== */
button {
  background: linear-gradient(45deg, purple, violet);
  border: none;
  padding: 10px 20px;
  color: white;
  border-radius: 6px;
  cursor: pointer;
}

button:hover {
  transform: scale(1.1);
}

/* ===== WHATS ===== */
.whats {
  color: #25D366;
  margin-top: 15px;
  text-decoration: none;
  font-weight: bold;
}

/* ===== CONTEÚDO ===== */
#conteudo {
  display: none;
  padding: 20px;
}

/* ===== ITENS ===== */
.container {
  max-width: 900px;
  margin: auto;
}

.item {
  display: flex;
  align-items: center;
  gap: 20px;
  background: rgba(255,255,255,0.08);
  padding: 20px;
  margin: 15px 0;
  border-radius: 12px;
}

.produto {
  width: 120px;
  height: 120px;
  object-fit: contain;
  transition: 0.4s;
  cursor: pointer;
}

.produto:hover {
  transform: scale(2.5);
}

.info {
  text-align: left;
}

.comprado {
  background: green !important;
}

/* CURSOR */
#cursor {
  position: fixed;
  width: 40px;
  pointer-events: none;
  z-index: 999;
  display: none;
}

</style>
</head>

<body>

<!-- LOGIN -->
<div id="bloqueio">
  <h1>🔒 Acesso à Lista</h1>
  <p>Solicite seu código no WhatsApp</p>

  <input id="codigo" placeholder="Digite seu código">
  <button onclick="validar()">Entrar</button>

  <a class="whats"
     href="https://wa.me/5511989163463?text=Olá,%20quero%20o%20código"
     target="_blank">
     📲 Pedir código
  </a>
</div>

<!-- SITE -->
<div id="conteudo">

  <!-- TITULO NOVO -->
  <h1 class="titulo-casamento">
    Um presente seu, uma memória pra sempre📦
  </h1>

  <div class="container">

    <!-- GELADEIRA -->
    <div class="item">
      <img src="Geladeira/G INOX 1.png" class="produto">
      <img src="Geladeira/G INOX 2.png" class="produto">
      <div class="info">
        <strong>Geladeira Duplex Inox</strong><br><br>
        <button onclick="marcar(this)">Disponível</button>
      </div>
    </div>

    <!-- FOGÃO -->
    <div class="item">
      <img src="Fogao/fogao1.png" class="produto">
      <img src="Fogao/fogao2.png" class="produto">
      <div class="info">
        <strong>Fogão</strong><br><br>
        <button onclick="marcar(this)">Disponível</button>
      </div>
    </div>

    <!-- PIX -->
    <div class="item">
      <img src="Pix/Pix1.png" class="produto">
      <img src="Pix/Pix2.png" class="produto">

      <div class="info">
        <strong>Pix</strong><br><br>

        <input type="number" id="valorPix" placeholder="Digite o valor"><br><br>

        <button onclick="gerarPix()">Gerar Pix</button><br><br>

        <img id="qrcode" style="display:none; width:200px;"><br><br>

        <button onclick="copiarPix()">Copiar código Pix</button>
      </div>
    </div>

  </div>

</div>

<img src="Mouse/Aliancas move.gif" id="cursor">

<script>

/* LOGIN */
const codigos = ["1234","5678","9999"];

function validar() {
  let input = document.getElementById("codigo").value.trim();

  if (codigos.includes(input)) {
    document.getElementById("bloqueio").style.display = "none";
    document.getElementById("conteudo").style.display = "block";
  } else {
    alert("Código inválido!");
  }
}

/* BOTÃO */
function marcar(btn) {
  btn.classList.toggle("comprado");
  btn.innerText = btn.classList.contains("comprado") ? "Comprado" : "Disponível";
}

/* PIX QR FIXO */
function gerarPix() {
  let valor = document.getElementById("valorPix").value;

  if (!valor || valor <= 0) {
    alert("Digite um valor válido!");
    return;
  }

  let img = document.getElementById("qrcode");
  img.src = "Qrcode/qrcode-pix.png";
  img.style.display = "block";
}

/* COPIAR PIX */
function copiarPix() {
  let valor = document.getElementById("valorPix").value;
  if (!valor || valor <= 0) return alert("Digite um valor válido!");

  navigator.clipboard.writeText("PIX GERADO");
  alert("Código Pix copiado!");
}

/* CURSOR */
const cursor = document.getElementById("cursor");

document.addEventListener("mousemove", e => {
  cursor.style.left = e.pageX + "px";
  cursor.style.top = e.pageY + "px";
});

document.querySelectorAll("a, button, img").forEach(el => {
  el.addEventListener("mouseenter", () => cursor.style.display = "block");
  el.addEventListener("mouseleave", () => cursor.style.display = "none");
});

</script>

</body>
</html>
