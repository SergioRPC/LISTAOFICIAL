<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- Fonte elegante -->
<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&display=swap" rel="stylesheet">

<style>
body {
  font-family: Arial, sans-serif;
  background-color: #0f0f1a;
  margin: 0;
  padding: 0;
  color: white;
}

/* ===== TÍTULO ===== */
.titulo-casamento {
  font-family: 'Great Vibes', cursive;
  font-size: 48px;
  text-align: center;
  color: #d8b4ff;
  margin: 30px 15px;

  white-space: normal;
  word-break: break-word;

  text-shadow: 0 0 5px #a855f7, 0 0 15px #6a0dad;

  opacity: 0;
  animation: fadeElegante 1.5s ease forwards;
}

/* SEM brilho passando */
.titulo-casamento::after {
  display: none;
}

@keyframes fadeElegante {
  from { opacity: 0; transform: translateY(15px); }
  to { opacity: 1; transform: translateY(0); }
}

/* ===== LISTA DE PRESENTES ===== */
.container {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  gap: 15px;
  padding: 20px;
}

.card {
  background: #1a1a2e;
  border-radius: 12px;
  padding: 15px;
  text-align: center;
  box-shadow: 0 0 10px rgba(168, 85, 247, 0.3);
}

.card img {
  width: 100%;
  border-radius: 10px;
}

.card h3 {
  margin: 10px 0;
}

.card button {
  background: #a855f7;
  border: none;
  padding: 10px;
  color: white;
  border-radius: 8px;
  cursor: pointer;
}

/* MOBILE */
@media (max-width: 600px) {
  .titulo-casamento {
    font-size: 42px;
    line-height: 1.3;
  }
}
</style>

<title>Lista de Presentes</title>
</head>

<body>

<!-- ===== TÍTULO ===== -->
<h1 class="titulo-casamento">
  Um presente seu, uma memória pra sempre📦
</h1>

<!-- ===== PRODUTOS ===== -->
<div class="container">

  <div class="card">
    <img src="https://via.placeholder.com/200" alt="Produto">
    <h3>Jogo de Panelas</h3>
    <button>Presentear</button>
  </div>

  <div class="card">
    <img src="https://via.placeholder.com/200" alt="Produto">
    <h3>Liquidificador</h3>
    <button>Presentear</button>
  </div>

  <div class="card">
    <img src="https://via.placeholder.com/200" alt="Produto">
    <h3>Micro-ondas</h3>
    <button>Presentear</button>
  </div>

</div>

</body>
</html>
