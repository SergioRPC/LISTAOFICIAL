<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&display=swap" rel="stylesheet">

<style>
body {
  font-family: Arial;
  background: linear-gradient(135deg, #0f0f0f, #4b0082);
  color: white;
  margin: 0;
}

#bloqueio {
  position: fixed;
  width: 100%;
  height: 100%;
  background: linear-gradient(135deg, #000, #4b0082);
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
}

#conteudo {
  display: none;
  padding: 20px;
}

input {
  padding: 12px;
  border-radius: 8px;
  border: none;
  margin: 10px;
  text-align: center;
}

button {
  background: linear-gradient(45deg, purple, violet);
  border: none;
  padding: 10px 20px;
  color: white;
  border-radius: 6px;
  cursor: pointer;
}

.container {
  max-width: 900px;
  margin: auto;
}

.item {
  background: rgba(255,255,255,0.08);
  padding: 20px;
  margin: 15px 0;
  border-radius: 12px;
  text-align: center;
}

.produto {
  width: 120px;
}

.comprado {
  background: green !important;
}

#checkPix {
  display: none;
  color: #00ff88;
  font-weight: bold;
}
</style>
</head>

<body>

<div id="bloqueio">
  <h1>🔒 Acesso</h1>
  <input id="codigo" placeholder="Digite o código">
  <button onclick="validar()">Entrar</button>
</div>

<div id="conteudo">

  <h1 style="text-align:center;">Lista de Casamento 🎁</h1>

  <div class="container">

    <div class="item">
      <strong>Pix</strong><br><br>

      <input type="number" id="valorPix" placeholder="Digite o valor"><br><br>

      <button onclick="gerarPix()">Gerar Pix</button><br><br>

      <img id="qrcode" style="display:none; width:250px;"><br><br>

      <button onclick="copiarPix()">Copiar código Pix</button><br>

      <span id="checkPix">✔ Copiado!</span>
    </div>

  </div>

</div>

<script>

// LOGIN
const codigos = ["1234","5678","9999"];

function validar() {
  let input = document.getElementById("codigo").value.trim();

  if (codigos.includes(input)) {
    document.getElementById("bloqueio").style.display = "none";
    document.getElementById("conteudo").style.display = "block";
  } else {
    alert("Código inválido!");
  }
}

// GERAR PIX
function gerarPix() {
  let valor = document.getElementById("valorPix").value;

  if (!valor || valor <= 0) {
    alert("Digite um valor!");
    return;
  }

  valor = parseFloat(valor).toFixed(2);

  function crc16(str) {
    let crc = 0xFFFF;
    for (let i = 0; i < str.length; i++) {
      crc ^= str.charCodeAt(i) << 8;
      for (let j = 0; j < 8; j++) {
        crc = (crc & 0x8000) ? (crc << 1) ^ 0x1021 : crc << 1;
      }
    }
    crc &= 0xFFFF;
    return crc.toString(16).toUpperCase().padStart(4, '0');
  }

  let base = "00020126410014BR.GOV.BCB.PIX0119ladym2393@gmail.com52040000530398654";
  let tamanho = valor.length.toString().padStart(2, '0');
  let resto = "5802BR5908PRESENTE6006BRASIL62070503***6304";

  let payload = base + tamanho + valor + resto;
  let crc = crc16(payload);
  let codigoPix = payload + crc;

  window.codigoPixGerado = codigoPix;

  let img = document.getElementById("qrcode");
  img.src = "https://api.qrserver.com/v1/create-qr-code/?size=300x300&data=" + encodeURIComponent(codigoPix);
  img.style.display = "block";
}

// COPIAR PIX
function copiarPix() {
  if (!window.codigoPixGerado) {
    alert("Gere o Pix primeiro!");
    return;
  }

  navigator.clipboard.writeText(window.codigoPixGerado);

  let check = document.getElementById("checkPix");
  check.style.display = "inline";

  setTimeout(() => {
    check.style.display = "none";
  }, 2000);
}

</script>

</body>
</html>
