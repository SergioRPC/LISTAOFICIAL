<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎁 Um presente seu, uma memória pra sempre</title>

<style>
/* ================= FUNDO ================= */
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg, #1a001f, #000000);
  color: white;
  text-align: center;
}

/* ================= TITULO ================= */
.titulo-casamento {
  font-size: 48px;
  margin: 20px;
  font-family: 'Georgia', serif;
  white-space: normal;
  animation: brilhoLuxo 3s ease-in-out infinite alternate;
}

@keyframes brilhoLuxo {
  0% { opacity: 0.7; text-shadow: 0 0 10px #a855f7; }
  100% { opacity: 1; text-shadow: 0 0 30px #d8b4fe; }
}

/* ================= PRODUTOS ================= */
.container {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
}

.item {
  background: #111;
  border-radius: 12px;
  padding: 15px;
  margin: 10px;
  width: 250px;
  box-shadow: 0 0 15px rgba(168, 85, 247, 0.5);
}

.item img {
  width: 100%;
  border-radius: 10px;
}

button {
  background: #a855f7;
  color: white;
  border: none;
  padding: 10px;
  border-radius: 8px;
  cursor: pointer;
}

button:hover {
  background: #9333ea;
}

/* ================= QR CODE ================= */
#qrcode {
  margin-top: 30px;
}

#qrcode img {
  width: 220px;
}

/* ================= MOBILE ================= */
@media (max-width: 600px) {
  .titulo-casamento {
    font-size: 34px;
  }

  .item {
    width: 90%;
  }
}
</style>
</head>

<body>

<h1 class="titulo-casamento">Um presente seu, uma memória pra sempre📦</h1>

<div class="container">

  <!-- ITEM 1 -->
  <div class="item">
    <img src="https://via.placeholder.com/250">
    <h3>Air Fryer</h3>
    <p>R$ 350</p>
    <button onclick="gerarPix()">Gerar Pix</button>
  </div>

  <!-- ITEM 2 -->
  <div class="item">
    <img src="https://via.placeholder.com/250">
    <h3>Liquidificador</h3>
    <p>R$ 200</p>
    <button onclick="gerarPix()">Gerar Pix</button>
  </div>

  <!-- ITEM 3 -->
  <div class="item">
    <img src="https://via.placeholder.com/250">
    <h3>Micro-ondas</h3>
    <p>R$ 600</p>
    <button onclick="gerarPix()">Gerar Pix</button>
  </div>

  <!-- ITEM 4 -->
  <div class="item">
    <img src="https://via.placeholder.com/250">
    <h3>Geladeira</h3>
    <p>R$ 1800</p>
    <button onclick="gerarPix()">Gerar Pix</button>
  </div>

  <!-- ITEM 5 -->
  <div class="item">
    <img src="https://via.placeholder.com/250">
    <h3>Fogão</h3>
    <p>R$ 900</p>
    <button onclick="gerarPix()">Gerar Pix</button>
  </div>

  <!-- ITEM 6 -->
  <div class="item">
    <img src="https://via.placeholder.com/250">
    <h3>TV</h3>
    <p>R$ 2200</p>
    <button onclick="gerarPix()">Gerar Pix</button>
  </div>

</div>

<!-- QR CODE -->
<div id="qrcode"></div>

<script>
function gerarPix() {
  document.getElementById("qrcode").innerHTML = `
    <img src="qrcode-pix.png" alt="QR Code Pix">
  `;
}
</script>

</body>
</html>
