<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>🎁 Lista de Casamento</title>

<style>
body {
  font-family: Arial;
  background: linear-gradient(135deg, #0f0f0f, #4b0082);
  color: white;
  margin: 0;
}

#bloqueio {
  position: fixed;
  width: 100%;
  height: 100%;
  background: linear-gradient(135deg, #000, #4b0082);
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
}

.fade {
  animation: fadeIn 1s ease forwards;
}

@keyframes fadeIn {
  from {opacity: 0; transform: scale(0.9);}
  to {opacity: 1; transform: scale(1);}
}

input {
  padding: 12px;
  border-radius: 8px;
  border: none;
  margin: 10px;
  text-align: center;
}

button {
  background: linear-gradient(45deg, purple, violet);
  border: none;
  padding: 10px 20px;
  color: white;
  border-radius: 6px;
  cursor: pointer;
  transition: 0.3s;
}

button:hover {
  transform: scale(1.1);
}

.whats {
  color: #25D366;
  margin-top: 15px;
  text-decoration: none;
  font-weight: bold;
}

#conteudo {
  display: none;
  padding: 20px;
}

.container {
  max-width: 900px;
  margin: auto;
}

.item {
  display: flex;
  align-items: center;
  gap: 20px;
  background: rgba(255,255,255,0.08);
  padding: 20px;
  margin: 15px 0;
  border-radius: 12px;
}

.produto {
  width: 120px;
  height: 120px;
  object-fit: contain;
  transition: 0.4s;
  cursor: pointer;
}

.produto:hover {
  transform: scale(2.5);
}

.info {
  text-align: left;
}

.comprado {
  background: green !important;
}

#cursor {
  position: fixed;
  width: 40px;
  pointer-events: none;
  z-index: 999;
  display: none;
}
</style>
</head>

<body>

<div id="bloqueio" class="fade">
  <h1>🔒 Acesso à Lista</h1>
  <p>Solicite seu código no WhatsApp</p>

  <input id="codigo" placeholder="Digite seu código">

  <button onclick="validar()">Entrar</button>

  <a class="whats"
     href="https://wa.me/5511989163463?text=Olá,%20quero%20o%20código%20da%20lista%20de%20casamento"
     target="_blank">
     📲 Pedir código no WhatsApp
  </a>
</div>

<div id="conteudo">
  <h1>🎁 Lista de Casamento</h1>

  <div class="container">

    <!-- PIX -->
    <div class="item">
      <img src="Pix/Pix1.png" class="produto">
      <img src="Pix/Pix2.png" class="produto">

      <div class="info">
        <strong>Pix</strong><br><br>

        <input type="number" id="valorPix" placeholder="Digite o valor (R$)"><br><br>

        <button onclick="gerarLinkPix()">Gerar link Pix</button><br><br>

        <a id="linkPix" target="_blank" style="display:none; color:#00ffcc; font-weight:bold;">
          👉 Pagar com Pix
        </a><br><br>

        <button onclick="copiarPix()">Copiar código Pix</button>
      </div>
    </div>

  </div>
</div>

<img src="Mouse/Aliancas move.gif" id="cursor">

<script>

/* ===== LOGIN ===== */
const codigos = ["1234","5678","9999"];

function validar() {
  let input = document.getElementById("codigo").value.trim();

  if (codigos.includes(input)) {
    document.getElementById("bloqueio").style.display = "none";
    document.getElementById("conteudo").style.display = "block";
  } else {
    alert("Código inválido!");
  }
}

/* ===== BOTÃO ===== */
function marcar(btn) {
  if (btn.innerText === "Disponível") {
    btn.innerText = "Comprado";
    btn.classList.add("comprado");
  } else {
    btn.innerText = "Disponível";
    btn.classList.remove("comprado");
  }
}

/* ===== PIX CORRETO ===== */

function format(id, value) {
  let size = value.length.toString().padStart(2, "0");
  return id + size + value;
}

function crc16(str) {
  let crc = 0xFFFF;

  for (let i = 0; i < str.length; i++) {
    crc ^= str.charCodeAt(i) << 8;

    for (let j = 0; j < 8; j++) {
      crc = (crc & 0x8000) ? (crc << 1) ^ 0x1021 : crc << 1;
    }
  }

  return (crc & 0xFFFF).toString(16).toUpperCase().padStart(4, "0");
}

function gerarPayloadPix(valor) {

  let chave = "ladym2393@gmail.com";

  let payload =
    "000201" +
    format("26",
      format("00", "BR.GOV.BCB.PIX") +
      format("01", chave)
    ) +
    "52040000" +
    "5303986" +
    format("54", parseFloat(valor).toFixed(2)) +
    "5802BR" +
    format("59", "PRESENTE") +
    format("60", "BRASIL") +
    "62070503***";

  payload += "6304" + crc16(payload + "6304");

  return payload;
}

function gerarLinkPix() {
  let valor = document.getElementById("valorPix").value;

  if (!valor || valor <= 0) {
    alert("Digite um valor válido!");
    return;
  }

  let payload = gerarPayloadPix(valor);

  document.getElementById("linkPix").href = "pix://" + payload;
  document.getElementById("linkPix").style.display = "inline";
}

function copiarPix() {
  let valor = document.getElementById("valorPix").value;

  if (!valor || valor <= 0) {
    alert("Digite um valor válido!");
    return;
  }

  let payload = gerarPayloadPix(valor);

  navigator.clipboard.writeText(payload);
  alert("Código Pix válido copiado!");
}

/* ===== CURSOR ===== */
const cursor = document.getElementById("cursor");

document.addEventListener("mousemove", (e) => {
  cursor.style.left = e.pageX + "px";
  cursor.style.top = e.pageY + "px";
});

document.querySelectorAll("a, button, img").forEach(el => {
  el.addEventListener("mouseenter", () => cursor.style.display = "block");
  el.addEventListener("mouseleave", () => cursor.style.display = "none");
});

</script>

</body>
</html>
