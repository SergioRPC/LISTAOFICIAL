<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta charset="UTF-8">

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&display=swap" rel="stylesheet">

<style>
/* (SEU CSS INTEIRO MANTIDO — NÃO ALTEREI NADA) */
#toastPix {
  position: fixed;
  bottom: 30px;
  left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: linear-gradient(45deg, #6a0dad, #a855f7);
  color: white;
  padding: 14px 22px;
  border-radius: 12px;
  font-size: 14px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.4);
  opacity: 0;
  transition: all 0.4s ease;
  z-index: 9999;
}

#toastPix.show {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
}
</style>
</head>

<body>

<!-- 🔒 LOGIN -->
<div id="bloqueio" class="fade">
  <h1>🔒 Acesso à Lista</h1>
  <p>Solicite seu código no WhatsApp</p>
  <input id="codigo" placeholder="Digite seu código">
  <button onclick="validar()">Entrar</button>

  <a class="whats"
     href="https://wa.me/5511989163463?text=Olá,%20quero%20o%20código%20da%20lista%20de%20casamento"
     target="_blank">
     📲 Pedir código no WhatsApp
  </a>
</div>

<!-- 🛍️ SITE -->
<div id="conteudo">

<h1 class="titulo-casamento">
  <p class="frase">Um presente seu, uma memória pra sempre 🎁</p>
  <div class="nomes">Sergio & Karina 👩🏻‍❤️‍💋‍👨🏻</div>
  <p class="data">28 de Fevereiro de 2027 📅</p>
</h1>

<div class="container">

<!-- PIX -->
<div class="item">
  <img src="Pix/Pix1.png" class="produto">

  <div class="info">
    <strong>Pix</strong><br><br>

    <input type="number" id="valorPix" placeholder="Digite o valor (R$)"><br><br>

    <button onclick="gerarPix()">Gerar Pix</button>

    <img id="qrcode" style="display:none; width:400px; max-width:100%;">

    <button onclick="copiarPix()">Copiar código Pix</button>
  </div>
</div>

</div>
</div>

<img src="Mouse/Aliancas move.gif" id="cursor">

<script>

// ✅ GERAR PIX (CORRIGIDO)
function gerarPix() {
  let valor = document.getElementById("valorPix").value;

  if (!valor || valor <= 0) {
    alert("Digite um valor válido!");
    return;
  }

  valor = parseFloat(valor).toFixed(2);

  function crc16(str) {
    let crc = 0xFFFF;

    for (let i = 0; i < str.length; i++) {
      crc ^= str.charCodeAt(i) << 8;

      for (let j = 0; j < 8; j++) {
        if (crc & 0x8000) {
          crc = (crc << 1) ^ 0x1021;
        } else {
          crc = crc << 1;
        }
      }
    }

    crc &= 0xFFFF;
    return crc.toString(16).toUpperCase().padStart(4, '0');
  }

  let base = "00020126410014BR.GOV.BCB.PIX0119ladym2393@gmail.com52040000530398654";
  let tamanho = valor.length.toString().padStart(2, '0');
  let resto = "5802BR5908PRESENTE6006BRASIL62070503***6304";

  let payload = base + tamanho + valor + resto;
  let crc = crc16(payload);
  let codigoPix = payload + crc;

  window.codigoPixGerado = codigoPix;

  let qr = document.getElementById("qrcode");
  qr.src = "https://api.qrserver.com/v1/create-qr-code/?size=300x300&data=" + encodeURIComponent(codigoPix);
  qr.style.display = "block";
}

// ✅ COPIAR PIX
function copiarPix() {
  if (!window.codigoPixGerado) {
    alert("Gere o Pix primeiro!");
    return;
  }

  navigator.clipboard.writeText(window.codigoPixGerado);

  let toast = document.getElementById("toastPix");
  toast.classList.add("show");

  setTimeout(() => {
    toast.classList.remove("show");
  }, 2000);
}

// LOGIN
const codigos = ["1234","5678","9999"];

function validar() {
  let input = document.getElementById("codigo").value.trim();

  if (codigos.includes(input)) {
    document.getElementById("bloqueio").style.display = "none";
    document.getElementById("conteudo").style.display = "block";
  } else {
    alert("Código inválido!");
  }
}

// CURSOR
const cursor = document.getElementById("cursor");

document.addEventListener("mousemove", e => {
  cursor.style.left = e.pageX + "px";
  cursor.style.top = e.pageY + "px";
});

</script>

<!-- ✅ TOAST -->
<div id="toastPix">✔ Código Pix copiado</div>

</body>
</html>
