<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta charset="UTF-8">

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&display=swap" rel="stylesheet">

<style>
#bloqueio {
  font-size: 22px;
}

#bloqueio input {
  font-size: 18px;
  width: 80%;
  max-width: 300px;
}

#bloqueio button {
  font-size: 18px;
  padding: 12px 25px;
}
/* ===== TÍTULO (SEM BRILHO) ===== */
.titulo-casamento {
  font-family: 'Great Vibes', cursive;
  font-size: 48px;
  text-align: center;
  color: #d8b4ff;
  margin: 30px 15px;
  position: relative;

  white-space: normal;
  word-break: break-word;

  text-shadow: 0 0 5px #a855f7, 0 0 15px #6a0dad;

  opacity: 0;
  animation: fadeElegante 1.5s ease forwards;
}

/* 🔴 REMOVIDO O BRILHO */
.titulo-casamento::after {
  display: none;
}

/* animação */
@keyframes fadeElegante {
  from { opacity: 0; transform: translateY(15px); }
  to { opacity: 1; transform: translateY(0); }
}

/* MOBILE */
@media (max-width: 600px) {
  .titulo-casamento {
    font-size: 42px !important;
    line-height: 1.3;
  }
}
@media (max-width: 600px) {

  /* itens mais organizados */
  .item {
    flex-direction: column;
    text-align: center;
    gap: 10px;
    padding: 15px;
  }

  /* imagens menores (melhor leitura) */
  .produto {
    width: 90px;
    height: 90px;
  }

  /* texto mais legível */
  .info {
    text-align: center;
    font-size: 15px;
  }

  /* botão melhor no dedo */
  button {
    width: 100%;
    max-width: 200px;
  }

}
</style>

<style>

/* ===== ESTILO GERAL ===== */
body {
  font-family: Arial;
  background: linear-gradient(135deg, #0f0f0f, #4b0082);
  color: white;
  margin: 0;
}

/* ===== BLOQUEIO ===== */
#bloqueio {
  position: fixed;
  width: 100%;
  height: 100%;
  background: linear-gradient(135deg, #000, #4b0082);
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
}

/* ANIMAÇÃO */
.fade {
  animation: fadeIn 1s ease forwards;
}

@keyframes fadeIn {
  from {opacity: 0; transform: scale(0.9);}
  to {opacity: 1; transform: scale(1);}
}

/* INPUT */
input {
  padding: 12px;
  border-radius: 8px;
  border: none;
  margin: 10px;
  text-align: center;
}

/* BOTÃO */
button {
  background: linear-gradient(45deg, purple, violet);
  border: none;
  padding: 10px 20px;
  color: white;
  border-radius: 6px;
  cursor: pointer;
  transition: 0.3s;
}

button:hover {
  transform: scale(1.1);
}

/* WHATS */
.whats {
  color: #25D366;
  margin-top: 15px;
  text-decoration: none;
  font-weight: bold;
}

/* ===== CONTEÚDO ===== */
#conteudo {
  display: none;
  padding: 20px;
}

/* CONTAINER */
.container {
  max-width: 900px;
  margin: auto;
}

/* ITEM */
.item {
  display: flex;
  align-items: center;
  gap: 20px;
  background: rgba(255,255,255,0.08);
  padding: 20px;
  margin: 15px 0;
  border-radius: 12px;
}

/* IMAGEM */
.produto {
  width: 120px;
  height: 120px;
  object-fit: contain;
  transition: 0.4s;
  cursor: pointer;
}

.produto:hover {
  transform: scale(2.5);
}

/* TEXTO */
.info {
  text-align: left;
}

/* BOTÃO COMPRADO */
.comprado {
  background: green !important;
}

/* ===== CURSOR ANIMADO ===== */
#cursor {
  position: fixed;
  width: 40px;
  pointer-events: none;
  z-index: 999;
  display: none;
}

</style>
</head>

<body>

<!-- 🔒 LOGIN -->
<div id="bloqueio" class="fade">

  <h1>🔒 Acesso à Lista</h1>
  <p>Solicite seu código no WhatsApp</p>

  <input id="codigo" placeholder="Digite seu código">

  <button onclick="validar()">Entrar</button>

  <a class="whats"
     href="https://wa.me/5511989163463?text=Olá,%20quero%20o%20código%20da%20lista%20de%20casamento"
     target="_blank">
     📲 Pedir código no WhatsApp
  </a>

</div>

<!-- 🛍️ SITE -->
<div id="conteudo">

  <!-- ✅ TÍTULO (MANTIDO, SÓ SEM BRILHO) -->
  <h1 class="titulo-casamento">
    Um presente seu, uma memória pra sempre🎁
  </h1>

  <div class="container">

    <!-- GELADEIRA -->
    <div class="item">
      <img src="Geladeira/G INOX 1.png" class="produto">
      <img src="Geladeira/G INOX 2.png" class="produto">

      <div class="info">
        <strong>Geladeira Duplex Inox</strong><br><br>
        <button onclick="marcar(this)">Disponível</button>
      </div>
    </div>
    
    <!-- FOGÃO -->
    <div class="item">
     <img src="Fogao/fogao1.png" class="produto">
     <img src="Fogao/fogao2.png" class="produto">

      <div class="info">
        <strong>Fogão 4/5 Bocas mesa vidro inox/preto</strong><br><br>
       <button onclick="marcar(this)">Disponível</button>
      </div>
    </div>
    
    <!-- SOFA -->
    <div class="item">
      <img src="Sofa/sofa1.png" class="produto">
      <img src="Sofa/sofa2.png" class="produto">

      <div class="info">
        <strong>Sofá Retrátil e Reclinável</strong><br><br>
        <button onclick="marcar(this)">Disponível</button>
      </div>
    </div>

    <!-- MESA -->
    <div class="item">
     <img src="Mesa/mesa1.png" class="produto">
     <img src="Mesa/mesa2.png" class="produto">

      <div class="info">
        <strong>Mesa Madeira</strong><br><br>
       <button onclick="marcar(this)">Disponível</button>
      </div>
    </div>
    
<!-- PIX -->
<div class="item">
  <img src="Pix/Pix1.png" class="produto">

  <div class="info">
    <strong>Pix</strong><br><br>

    <input type="number" id="valorPix" placeholder="Digite o valor (R$)"><br><br>

<button onclick="gerarPix()">Gerar Pix</button>

<img id="qrcode" style="display:none; width:400px; max-width:100%;">

<button onclick="copiarPix()">Copiar código Pix</button>
  </div>
</div>

  </div>

</div>

<img src="Mouse/Aliancas move.gif" id="cursor">

<script>
function gerarPix() {
  let valor = document.getElementById("valorPix").value;

  if (!valor || valor <= 0) {
    alert("Digite um valor válido!");
    return;
  }

  let img = document.getElementById("qrcode");
  img.src = "Qrcode/qrcode-pix.png";
  img.style.display = "block";
}

const codigos = ["1234","5678","9999"];

function validar() {
  let input = document.getElementById("codigo").value.trim();

  if (codigos.includes(input)) {
    document.getElementById("bloqueio").style.display = "none";
    document.getElementById("conteudo").style.display = "block";
  } else {
    alert("Código inválido!");
  }
}

function marcar(btn) {
  btn.classList.toggle("comprado");
  btn.innerText = btn.classList.contains("comprado") ? "Comprado" : "Disponível";
}

function copiarPix() {
  let valor = document.getElementById("valorPix").value;
  if (!valor || valor <= 0) return alert("Digite um valor válido!");

  navigator.clipboard.writeText("PIX GERADO");
  alert("Código Pix válido copiado!");
}

const cursor = document.getElementById("cursor");

document.addEventListener("mousemove", e => {
  cursor.style.left = e.pageX + "px";
  cursor.style.top = e.pageY + "px";
});

document.querySelectorAll("a, button, img").forEach(el => {
  el.addEventListener("mouseenter", () => cursor.style.display = "block");
  el.addEventListener("mouseleave", () => cursor.style.display = "none");
});
/* PADRÃO IGUAL PARA TODOS OS BOTÕES */
.info button {
  display: inline-block;
  margin-top: 10px;
}

/* ORGANIZA BOTÕES DO PIX IGUAL AOS OUTROS */
.item .info {
  display: flex;
  flex-direction: column;
  align-items: flex-start;
}
</script>

</body>
</html>
